services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LIMITER_ENABLED=true
      - LLM_PROVIDER_API_KEY=${LLM_PROVIDER_API_KEY}
    volumes:
      - ./models:/app/models
    networks:
      - churn-network

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - BACKEND_INTERNAL_URL=http://api:8000
    depends_on:
      - api
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge
