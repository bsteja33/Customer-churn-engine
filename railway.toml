# Railway deployment reference
#
# Railway auto-detects Dockerfile and deploys the FastAPI service.
# Drop this file at the repo root if you want a one-click import via
# https://railway.app/new (Railway reads `railway.toml`).
#
# Environment variables are configured in the Railway dashboard, not
# in this file. Required:
#   LLM_PROVIDER_API_KEY  — your LLM provider key
#   CORS_ORIGINS          — comma-separated list of allowed FE origins,
#                            e.g. "https://churn-engine.vercel.app"
#   PORT                  — defaults to 8000; Railway injects $PORT itself

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn api.app:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
